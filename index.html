<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Feliz 20 de Mayo | Carta de Amor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff0f3 0%, #ffe4e9 40%, #ffd6dc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', 'Segoe UI', 'Poppins', 'Georgia', cursive;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Corazones flotantes románticos */
        .romantic-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.2;
            animation: floatHeart 12s infinite ease-in-out;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        .rose {
            position: absolute;
            font-size: 2rem;
            opacity: 0.15;
            animation: floatRose 14s infinite ease-in-out;
        }

        @keyframes floatRose {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Contenedor principal romántico */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 245, 245, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 60px 60px 70px 70px;
            padding: 2.5rem 3rem;
            border: 2px solid rgba(220, 80, 100, 0.5);
            box-shadow: 0 30px 50px rgba(180, 60, 80, 0.25), inset 0 1px 4px rgba(255, 255, 255, 0.8);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            max-width: 550px;
            margin: 20px;
        }

        .container:hover {
            transform: scale(1.01);
            box-shadow: 0 35px 55px rgba(200, 70, 100, 0.3);
        }

        /* Título romántico */
        h1 {
            font-size: 2.8rem;
            color: #c73e4d;
            text-shadow: 2px 2px 0 #ffe0e5, 0 0 15px #ffb7c1;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 1rem;
            font-family: 'Quicksand', 'Poppins', 'Georgia', cursive;
        }

        .subtitulo {
            font-size: 1.2rem;
            color: #d44c5c;
            background: rgba(255, 220, 225, 0.9);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            margin-bottom: 2rem;
            border-left: 3px solid #e87484;
            border-right: 3px solid #e87484;
            font-weight: 500;
        }

        .icono-libro {
            font-size: 5rem;
            margin: 20px 0;
            filter: drop-shadow(0 8px 18px rgba(200, 70, 90, 0.4));
            animation: latidoCorazon 1.6s infinite ease-in-out;
        }

        @keyframes latidoCorazon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); text-shadow: 0 0 12px #ff6b7c; }
        }

        /* Botón romántico */
        .btn-abrir {
            background: linear-gradient(135deg, #e87484, #c73e4d);
            border: none;
            padding: 16px 38px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff5f7;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 0 #8b2c38;
            font-family: 'Quicksand', 'Poppins', serif;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-abrir:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #8b2c38;
        }

        .btn-abrir:hover {
            background: linear-gradient(135deg, #f08b9a, #da4e5f);
            letter-spacing: 1.5px;
            box-shadow: 0 8px 0 #a03543;
            transform: translateY(-2px);
            gap: 18px;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #d47282;
            font-weight: 500;
            opacity: 0.8;
        }

        @media (max-width: 550px) {
            .container { padding: 1.8rem; margin: 15px; }
            h1 { font-size: 2rem; }
            .btn-abrir { font-size: 1.2rem; padding: 12px 28px; }
        }
    </style>
</head>
<body>
    <div class="romantic-bg">
        <div class="heart" style="top: 5%; left: 5%; animation-duration: 11s;">❤️</div>
        <div class="heart" style="bottom: 10%; right: 3%; animation-duration: 13s;">💖</div>
        <div class="heart" style="top: 30%; right: 12%; font-size: 2rem; animation-duration: 9s;">💗</div>
        <div class="rose" style="left: 10%; bottom: 15%; animation-duration: 8s;">🌹</div>
        <div class="rose" style="right: 18%; top: 20%; animation-duration: 10s;">🥀</div>
        <div class="heart" style="bottom: 20%; left: 20%; animation-duration: 14s;">💕</div>
        <div class="rose" style="left: 85%; top: 70%;">🌷</div>
        <div class="heart" style="left: 70%; top: 10%;">💘</div>
    </div>

    <div class="container">

        <h1>Feliz 20 de Mayo Amorcito</h1>
        <p style="color: #b84c5c; margin-bottom: 1.5rem; font-size: 1.2rem; font-weight: 500; background: rgba(255,235,238,0.7); display: inline-block; padding: 0.3rem 1.5rem; border-radius: 50px;">
            "Te Quiero Agradecer"
        </p>
        <button type="button" class="btn-abrir" id="openLetterBtn">
            <span></span> Siguiente <span></span>
        </button>
        <footer>✨ Haz clic para seguir ✨</footer>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="cancion/Te Amo y Mas.mpeg" type="audio/mpeg">
    </audio>

    <script>
        const musicaFondo = document.getElementById('bgMusic');
        musicaFondo.volume = 0.5;
        
        // Reproducir música al hacer clic en cualquier parte
        function iniciarMusica() {
            musicaFondo.play().catch(e => console.log("Error al reproducir:", e));
            document.body.removeEventListener('click', iniciarMusica);
        }
        document.body.addEventListener('click', iniciarMusica);
        
        // Botón lleva a carta.html
        const btn = document.getElementById('openLetterBtn');
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'carta.html';
        });
    </script>
</body>
</html>
